<!DOCTYPE html>
<html>

<head>
<title>Complete Profile</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
width:400px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:5px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:black;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

</style>

</head>

<body>

<div class="card">

<h2>Complete Your Profile</h2>

<input id="name" placeholder="Your name">

<input id="instagram" placeholder="Instagram username">

<select id="category">

<option disabled selected>Select category</option>

<option>Beauty</option>
<option>Fashion</option>
<option>Fitness</option>
<option>Food</option>
<option>Travel</option>
<option>Education</option>
<option>Technology</option>
<option>Finance</option>
<option>Lifestyle</option>
<option>Entertainment</option>

</select>

<button onclick="saveProfile()">Save Profile</button>

</div>

<script>

const supabase = window.supabase.createClient(
"https://vhdtlbpmstvnpcikrcwo.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoZHRsYnBtc3R2bnBjaWtyY3dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NzMyMTAsImV4cCI6MjA4OTE0OTIxMH0.1SwUzf7UAyUslpxIk6x7rXLfa4-naElyNSWtI2Un570"
)

async function loadProfile(){

const { data } = await supabase.auth.getSession()

if(!data.session){
window.location="index.html"
return
}

const user = data.session.user

const { data:profile } = await supabase
.from("profiles")
.select("*")
.eq("id", user.id)
.single()

if(profile){

document.getElementById("name").value = profile.name || ""
document.getElementById("instagram").value = profile.instagram || ""
document.getElementById("category").value = profile.category || ""

}

}

async function saveProfile(){

const { data } = await supabase.auth.getSession()

if(!data.session){
alert("Login required")
return
}

const user = data.session.user

const name = document.getElementById("name").value
const instagram = document.getElementById("instagram").value
const category = document.getElementById("category").value

const { error } = await supabase
.from("profiles")
.upsert({
id: user.id,
name: name,
email: user.email,
instagram: instagram,
category: category
})

if(error){
alert(error.message)
return
}

alert("Profile saved")

window.location = "dashboard.html"

}

loadProfile()

</script>

</body>

</html>
