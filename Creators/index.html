<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg: #f0f5fb;
  --white: #ffffff;
  --blue: #2f6bcd;
  --blue-light: #e8f0fc;
  --blue-mid: #b8cef5;
  --blue-dark: #1a4fa0;
  --text: #1a2540;
  --muted: #7b90b8;
  --border: #dce8f8;
  --error: #e05c5c;
  --success: #2e9e6b;
}

body{
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  position: relative;
  overflow-x: hidden;
}

body::before{
  content:'';
  position:fixed;
  top:-100px;
  right:-100px;
  width:500px;
  height:500px;
  background: radial-gradient(circle, rgba(47,107,205,0.08) 0%, transparent 70%);
  pointer-events:none;
}

body::after{
  content:'';
  position:fixed;
  bottom:-120px;
  left:-80px;
  width:400px;
  height:400px;
  background: radial-gradient(circle, rgba(47,107,205,0.06) 0%, transparent 70%);
  pointer-events:none;
}

.wrapper{
  width:100%;
  max-width:400px;
  position:relative;
  z-index:1;
  animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes fadeUp{
  from{ opacity:0; transform:translateY(24px); }
  to{ opacity:1; transform:translateY(0); }
}

.brand{
  text-align:center;
  margin-bottom:32px;
}

.logo{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:52px;
  height:52px;
  background: linear-gradient(135deg, var(--blue), #5b9cf6);
  border-radius:14px;
  margin-bottom:18px;
  box-shadow: 0 8px 24px rgba(47,107,205,0.25);
}

.logo svg{
  width:26px;
  height:26px;
  fill:white;
}

.brand h1{
  font-family:'Playfair Display', serif;
  font-size:26px;
  font-weight:600;
  color:var(--text);
  letter-spacing:-0.01em;
  line-height:1.2;
}

.brand p{
  color:var(--muted);
  font-size:14px;
  margin-top:8px;
  font-weight:300;
  line-height:1.5;
}

.tabs{
  display:flex;
  background:var(--white);
  border:1px solid var(--border);
  border-radius:12px;
  padding:4px;
  margin-bottom:20px;
  box-shadow: 0 2px 8px rgba(47,107,205,0.06);
}

.tab{
  flex:1;
  padding:10px;
  text-align:center;
  font-family:'Inter', sans-serif;
  font-size:13px;
  font-weight:500;
  border-radius:9px;
  cursor:pointer;
  color:var(--muted);
  transition:all 0.25s ease;
  border:none;
  background:transparent;
}

.tab.active{
  background: linear-gradient(135deg, var(--blue), #5b9cf6);
  color:white;
  box-shadow: 0 3px 10px rgba(47,107,205,0.25);
}

.card{
  background:var(--white);
  border:1px solid var(--border);
  border-radius:20px;
  padding:32px 28px;
  box-shadow: 0 4px 24px rgba(47,107,205,0.08);
}

.form-group{
  margin-bottom:16px;
}

label{
  display:block;
  font-size:11px;
  font-weight:500;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:7px;
}

input{
  width:100%;
  padding:13px 15px;
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-family:'Inter', sans-serif;
  font-size:15px;
  outline:none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
}

input:focus{
  border-color:var(--blue-mid);
  background:white;
  box-shadow:0 0 0 4px rgba(47,107,205,0.08);
}

input::placeholder{
  color:#b0c0d8;
}

.btn{
  width:100%;
  padding:14px;
  margin-top:22px;
  background: linear-gradient(135deg, var(--blue), #5b9cf6);
  color:white;
  border:none;
  border-radius:10px;
  font-family:'Inter', sans-serif;
  font-size:14px;
  font-weight:500;
  letter-spacing:0.02em;
  cursor:pointer;
  transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 14px rgba(47,107,205,0.3);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:48px;
}

.btn:hover{
  opacity:0.92;
  transform:translateY(-1px);
  box-shadow: 0 6px 20px rgba(47,107,205,0.35);
}

.btn:active{
  transform:translateY(0);
}

.btn:disabled{
  opacity:0.6;
  cursor:not-allowed;
  transform:none;
}

.btn-loader{
  display:none;
  width:16px;
  height:16px;
  border:2px solid rgba(255,255,255,0.35);
  border-top-color:white;
  border-radius:50%;
  animation:spin 0.65s linear infinite;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

.forgot{
  display:block;
  text-align:right;
  color:var(--blue);
  font-size:12px;
  margin-top:8px;
  cursor:pointer;
  text-decoration:none;
  font-weight:400;
  transition:opacity 0.2s;
  opacity:0.75;
}

.forgot:hover{ opacity:1; }

.msg{
  display:none;
  padding:12px 15px;
  border-radius:10px;
  font-size:13px;
  margin-top:16px;
  text-align:center;
  line-height:1.4;
}

.msg.error{
  background:#fef2f2;
  border:1px solid #fcd6d6;
  color:var(--error);
  display:block;
}

.msg.success{
  background:#f0faf6;
  border:1px solid #b6e8d2;
  color:var(--success);
  display:block;
}

.panel{ display:none; }
.panel.active{ display:block; }

.footer{
  text-align:center;
  margin-top:24px;
  color:var(--muted);
  font-size:12px;
  font-weight:300;
  line-height:1.6;
}

.footer a{
  color:var(--blue);
  text-decoration:none;
  opacity:0.8;
}

</style>
</head>

<body>

<div class="wrapper">

  <div class="brand">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
      </svg>
    </div>
    <h1>Creator Intelligence</h1>
    <p>Understand your Instagram growth,<br>one insight at a time.</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('signup')">Create Account</button>
    <button class="tab" onclick="switchTab('login')">Log In</button>
  </div>

  <div class="card">

    <div class="panel active" id="panel-signup">
      <div class="form-group">
        <label>Email</label>
        <input id="signupEmail" type="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="signupPassword" type="password" placeholder="Min. 6 characters">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input id="signupConfirm" type="password" placeholder="Repeat your password">
      </div>
      <button class="btn" id="signupBtn" onclick="signup()">
        <span id="signupText">Get Started</span>
        <div class="btn-loader" id="signupLoader"></div>
      </button>
      <div class="msg" id="signupMsg"></div>
    </div>

    <div class="panel" id="panel-login">
      <div class="form-group">
        <label>Email</label>
        <input id="loginEmail" type="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="loginPassword" type="password" placeholder="Your password">
        <a class="forgot" onclick="forgotPassword()">Forgot password?</a>
      </div>
      <button class="btn" id="loginBtn" onclick="login()">
        <span id="loginText">Log In</span>
        <div class="btn-loader" id="loginLoader"></div>
      </button>
      <div class="msg" id="loginMsg"></div>
    </div>

  </div>

  <div class="footer">
    By continuing you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a>
  </div>

</div>

<script>

checkSession()

async function checkSession(){
  const { data } = await client.auth.getSession()
  if(data.session) window.location = "dashboard.html"
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', (i===0 && tab==='signup') || (i===1 && tab==='login'))
  })
  document.getElementById('panel-signup').classList.toggle('active', tab==='signup')
  document.getElementById('panel-login').classList.toggle('active', tab==='login')
}

function setLoading(btn, loader, text, isLoading){
  document.getElementById(btn).disabled = isLoading
  document.getElementById(loader).style.display = isLoading ? 'block' : 'none'
  document.getElementById(text).style.display = isLoading ? 'none' : 'inline'
}

function showMsg(id, message, type){
  const el = document.getElementById(id)
  el.textContent = message
  el.className = 'msg ' + type
}

async function signup(){
  const email = document.getElementById('signupEmail').value.trim()
  const password = document.getElementById('signupPassword').value
  const confirm = document.getElementById('signupConfirm').value

  if(!email || !password){ showMsg('signupMsg','Please fill in all fields.','error'); return }
  if(password !== confirm){ showMsg('signupMsg','Passwords do not match.','error'); return }
  if(password.length < 6){ showMsg('signupMsg','Password must be at least 6 characters.','error'); return }

  setLoading('signupBtn','signupLoader','signupText', true)
  const { error } = await client.auth.signUp({ email, password })
  setLoading('signupBtn','signupLoader','signupText', false)

  if(error){
    showMsg('signupMsg', error.message, 'error')
  } else {
    showMsg('signupMsg', '✓ Account created! Taking you to your profile...', 'success')
    setTimeout(()=> window.location = 'profile.html', 1400)
  }
}

async function login(){
  const email = document.getElementById('loginEmail').value.trim()
  const password = document.getElementById('loginPassword').value

  if(!email || !password){ showMsg('loginMsg','Please fill in all fields.','error'); return }

  setLoading('loginBtn','loginLoader','loginText', true)
  const { error } = await client.auth.signInWithPassword({ email, password })
  setLoading('loginBtn','loginLoader','loginText', false)

  if(error){
    showMsg('loginMsg', error.message, 'error')
  } else {
    window.location = 'dashboard.html'
  }
}

async function forgotPassword(){
  const email = prompt('Enter your email address')
  if(!email) return
  const { error } = await client.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/reset.html'
  })
  alert(error ? error.message : 'Password reset email sent! Check your inbox.')
}

</script>

</body>
</html>
