<!DOCTYPE html>
<html>

<head>

<title>Creator Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:700px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
background:black;
color:white;
border:none;
cursor:pointer;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>Creator Intelligence Dashboard</h2>

<p id="userEmail"></p>

<button onclick="logout()">Logout</button>

</div>

<script>


checkUser()

async function checkUser(){

const { data } = await client.auth.getSession()

if(!data.session){
window.location="index.html"
return
}

document.getElementById("userEmail").innerText =
"Logged in as: " + data.session.user.email

}

async function logout(){

await client.auth.signOut()

window.location="index.html"

}

</script>

</body>

</html>
