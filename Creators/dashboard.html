<!DOCTYPE html>
<html lang="en">
  
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Creator Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg: #f0f5fb;
  --white: #ffffff;
  --blue: #2f6bcd;
  --blue-light: #e8f0fc;
  --blue-mid: #b8cef5;
  --text: #1a2540;
  --muted: #7b90b8;
  --border: #dce8f8;
  --success: #2e9e6b;
}

body{
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 24px 16px 48px;
  position: relative;
}

body::before{
  content:'';
  position:fixed;
  top:-100px;
  right:-100px;
  width:500px;
  height:500px;
  background: radial-gradient(circle, rgba(47,107,205,0.07) 0%, transparent 70%);
  pointer-events:none;
  z-index:0;
}

.container{
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

/* Nav */
.nav{
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  padding-top: 8px;
}

.nav-brand{
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
}

.nav-logout{
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  background: none;
  border: none;
  font-family: 'Inter', sans-serif;
  transition: color 0.2s;
}

.nav-logout:hover{ color: var(--text); }

/* Loading state */
.loading-card{
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px 28px;
  text-align: center;
  box-shadow: 0 4px 24px rgba(47,107,205,0.08);
}

.spinner{
  width: 40px;
  height: 40px;
  border: 3px solid var(--blue-light);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 20px;
}

@keyframes spin{ to{ transform: rotate(360deg); } }

.loading-title{
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}

.loading-sub{
  color: var(--muted);
  font-size: 13px;
  font-weight: 300;
}

/* Profile card */
.profile-card{
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px;
  box-shadow: 0 4px 24px rgba(47,107,205,0.08);
  margin-bottom: 16px;
  animation: fadeUp 0.5s ease both;
}

@keyframes fadeUp{
  from{ opacity:0; transform:translateY(16px); }
  to{ opacity:1; transform:translateY(0); }
}

.profile-header{
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}

.profile-pic{
  width: 64px;
  height: 64px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--blue-mid);
  flex-shrink: 0;
}

.profile-pic-placeholder{
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: var(--blue-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
  border: 2px solid var(--blue-mid);
}

.profile-info h2{
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 600;
  line-height: 1.2;
}

.profile-handle{
  color: var(--blue);
  font-size: 13px;
  margin-top: 3px;
}

.verified-badge{
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--blue-light);
  color: var(--blue);
  font-size: 11px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 100px;
  margin-top: 5px;
}

.bio{
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
  margin-bottom: 20px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
  white-space: pre-line;
}

/* Stats grid */
.stats{
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.stat{
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 10px;
  text-align: center;
}

.stat-value{
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  line-height: 1;
}

.stat-label{
  font-size: 11px;
  color: var(--muted);
  margin-top: 5px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Meta card */
.meta-card{
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px 28px;
  box-shadow: 0 4px 24px rgba(47,107,205,0.08);
  margin-bottom: 16px;
  animation: fadeUp 0.5s 0.1s ease both;
}

.meta-card h3{
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}

.meta-row{
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}

.meta-row:last-child{ border-bottom: none; }

.meta-key{ color: var(--muted); }
.meta-val{ font-weight: 500; color: var(--text); }

.tag{
  display: inline-flex;
  padding: 3px 10px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
}

.tag.yes{ background: #f0faf6; color: var(--success); }
.tag.no{ background: #fef2f2; color: #e05c5c; }
.tag.blue{ background: var(--blue-light); color: var(--blue); }

/* Scraped at */
.scraped-at{
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  margin-top: 8px;
  animation: fadeUp 0.5s 0.2s ease both;
}

/* Error state */
.error-card{
  background: #fef2f2;
  border: 1px solid #fcd6d6;
  border-radius: 16px;
  padding: 28px;
  text-align: center;
}

.error-card p{
  color: #e05c5c;
  font-size: 14px;
  margin-bottom: 16px;
}

.btn-retry{
  padding: 10px 24px;
  background: var(--blue);
  color: white;
  border: none;
  border-radius: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="container">

  <div class="nav">
    <div class="nav-brand">Creator Intelligence</div>
    <button class="nav-logout" onclick="logout()">Log out</button>
  </div>

  <div id="content">
    <!-- Filled by JS -->
  </div>

</div>

<script>

async function init(){

  // Check session
  const { data: sessionData } = await client.auth.getSession()
  if(!sessionData.session){
    window.location = 'index.html'
    return
  }

  const user = sessionData.session.user

  // Get instagram username from profiles
  const { data: profile } = await client
    .from('profiles')
    .select('instagram, last_scraped_at')
    .eq('id', user.id)
    .single()

  if(!profile || !profile.instagram){
    window.location = 'profile.html'
    return
  }

  const lastScraped = profile.last_scraped_at ? new Date(profile.last_scraped_at) : null
  const now = new Date()
  const hoursSince = lastScraped ? (now - lastScraped) / (1000 * 60 * 60) : null
  const needsScrape = !lastScraped || hoursSince >= 24

  if(needsScrape){
    showLoading()
 const res = await fetch(`/api/scrape?user_id=${user.id}&username=${profile.instagram}`)
 const resData = await res.json()
 console.log('Scrape response:', resData)
 if(!res.ok){
   showError(`Scrape failed: ${resData.error || 'Unknown error'}`)
   return
 }
  }

  // Load latest snapshot
  const { data: snapshot } = await client
    .from('profile_snapshots')
    .select('*')
    .eq('user_id', user.id)
    .order('scraped_at', { ascending: false })
    .limit(1)
    .single()

  if(!snapshot){
    showError('No data found. Please try refreshing.')
    return
  }

  showProfile(snapshot)
}

function showLoading(){
  document.getElementById('content').innerHTML = `
    <div class="loading-card">
      <div class="spinner"></div>
      <div class="loading-title">Fetching your Instagram data</div>
      <div class="loading-sub">This takes about 15–30 seconds...</div>
    </div>
  `
}

function showError(msg){
  document.getElementById('content').innerHTML = `
    <div class="error-card">
      <p>${msg}</p>
      <button class="btn-retry" onclick="init()">Retry</button>
    </div>
  `
}

function formatCount(n){
  if(!n) return '0'
  if(n >= 1000000) return (n / 1000000).toFixed(1) + 'M'
  if(n >= 1000) return (n / 1000).toFixed(1) + 'K'
  return n.toLocaleString()
}

function showProfile(s){
  const picHtml = s.profile_pic_url
    ? `<img class="profile-pic" src="${s.profile_pic_url}" alt="Profile">`
    : `<div class="profile-pic-placeholder">👤</div>`

  const verifiedHtml = s.is_verified
    ? `<div class="verified-badge">✓ Verified</div>`
    : ''

  const scrapedDate = s.scraped_at
    ? new Date(s.scraped_at).toLocaleString('en-IN', { dateStyle:'medium', timeStyle:'short' })
    : ''

  document.getElementById('content').innerHTML = `

    <div class="profile-card">
      <div class="profile-header">
        ${picHtml}
        <div class="profile-info">
          <h2>${s.full_name || s.instagram_username}</h2>
          <div class="profile-handle">@${s.instagram_username}</div>
          ${verifiedHtml}
        </div>
      </div>

      ${s.biography ? `<div class="bio">${s.biography}</div>` : ''}

      <div class="stats">
        <div class="stat">
          <div class="stat-value">${formatCount(s.followers_count)}</div>
          <div class="stat-label">Followers</div>
        </div>
        <div class="stat">
          <div class="stat-value">${formatCount(s.following_count)}</div>
          <div class="stat-label">Following</div>
        </div>
        <div class="stat">
          <div class="stat-value">${formatCount(s.posts_count)}</div>
          <div class="stat-label">Posts</div>
        </div>
      </div>
    </div>

    <div class="meta-card">
      <h3>Account Details</h3>
      <div class="meta-row">
        <span class="meta-key">Account Type</span>
        <span class="meta-val">
          ${s.is_business_account
            ? `<span class="tag blue">${s.business_category_name || 'Business'}</span>`
            : `<span class="tag blue">Personal</span>`}
        </span>
      </div>
      <div class="meta-row">
        <span class="meta-key">Private</span>
        <span class="tag ${s.is_private ? 'no' : 'yes'}">${s.is_private ? 'Yes' : 'No'}</span>
      </div>
      <div class="meta-row">
        <span class="meta-key">Highlights</span>
        <span class="meta-val">${s.highlight_reel_count || 0}</span>
      </div>
      ${s.external_url ? `
      <div class="meta-row">
        <span class="meta-key">Link</span>
        <a href="${s.external_url}" target="_blank" style="color:var(--blue);font-size:13px;word-break:break-all;">${s.external_url}</a>
      </div>` : ''}
    </div>

    <div class="scraped-at">Last updated: ${scrapedDate}</div>
  `
}

async function logout(){
  await client.auth.signOut()
  window.location = 'index.html'
}

init()

</script>

</body>
</html>
