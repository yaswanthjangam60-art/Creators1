<!DOCTYPE html>
<html>

<head>

<title>Creator Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
width:400px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
width:100%;
padding:10px;
margin-top:15px;
background:black;
color:white;
border:none;
cursor:pointer;
}

.profile{
margin-top:20px;
}

</style>

</head>

<body>

<div class="card">

<h2>Creator Intelligence</h2>

<button onclick="runScrape()">Scrape Instagram</button>

<div class="profile">

<p><b>Username:</b> <span id="username"></span></p>
<p><b>Bio:</b> <span id="bio"></span></p>
<p><b>Followers:</b> <span id="followers"></span></p>

</div>

</div>

<script>

const client = window.supabase.createClient(
"https://vhdtlbpmstvnpcikrcwo.supabase.co",
"sb_publishable_Rs5RaSAA2o3OXbWTL4-e2Q_V8kfzg0y"
)

async function runScrape(){

const { data } = await client.auth.getSession()

if(!data.session){
alert("Login required")
return
}

const user = data.session.user

const { data:profile } = await client
.from("profiles")
.select("instagram")
.eq("id",user.id)
.single()

const username = profile.instagram

await fetch(`/api/scrape?username=${username}&user_id=${user.id}`)

loadProfile()

}

async function loadProfile(){

const { data } = await client.auth.getSession()

if(!data.session){
window.location="index.html"
return
}

const user_id = data.session.user.id

const { data:profile } = await client
.from("profile_snapshots")
.select("instagram_username, biography, followers_count")
.eq("user_id",user_id)
.order("scraped_at",{ascending:false})
.limit(1)
.single()

if(profile){

document.getElementById("username").innerText = profile.instagram_username
document.getElementById("bio").innerText = profile.biography
document.getElementById("followers").innerText = profile.followers_count

}

}

loadProfile()

</script>

</body>

</html>
